name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Debug - Show gradlew content
      run: |
        echo "=== First 50 lines of gradlew ==="
        head -50 ./gradlew || echo "gradlew not found"

    - name: Remove broken gradlew
      run: |
        rm -f ./gradlew
        rm -f ./gradlew.bat
        rm -rf gradle/

    - name: Create gradle wrapper
      run: |
        mkdir -p gradle/wrapper
        wget -O gradle/wrapper/gradle-wrapper.jar https://repo.gradle.org/gradle/gradle-9.4.1-wrapper.jar
        echo 'distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists' > gradle/wrapper/gradle-wrapper.properties

    - name: Create gradlew script
      run: |
        cat > gradlew << 'EOF'
#!/usr/bin/env sh
exec gradle "$@"
EOF
        chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
