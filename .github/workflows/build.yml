name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Remove broken gradlew
      run: |
        rm -f ./gradlew
        rm -f ./gradlew.bat
        rm -rf gradle/

    - name: Create gradle wrapper directory
      run: mkdir -p gradle/wrapper

    - name: Create gradle wrapper properties
      run: |
        cat > gradle/wrapper/gradle-wrapper.properties << 'GRADLE_PROPS'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
        networkTimeout=10000
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        GRADLE_PROPS

    - name: Create gradlew script
      run: |
        cat > gradlew << 'GRADLEW_SCRIPT'
        #!/usr/bin/env sh
        exec gradle "$@"
        GRADLEW_SCRIPT
        chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
